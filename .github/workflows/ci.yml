name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openlogs/types --filter @openlogs/server --filter @openlogs/sdk run build
      - run: pnpm --filter @openlogs/web run build
      - run: pnpm --filter @openlogs/mcp --filter @openlogs/cli run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openlogs/types --filter @openlogs/server --filter @openlogs/sdk run build
      - run: pnpm --filter @openlogs/web run build
      - run: pnpm --filter @openlogs/mcp --filter @openlogs/cli run build
      - run: pnpm --filter @openlogs/server --filter @openlogs/mcp --filter @openlogs/cli --filter @openlogs/sdk test
